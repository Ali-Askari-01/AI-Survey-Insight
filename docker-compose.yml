# ═══════════════════════════════════════════════════
# Docker Compose — AI Survey Software
# Infrastructure & Scalability Architecture (Section 5)
# ═══════════════════════════════════════════════════
#
# Each component runs independently:
#   Backend Container (API + static files)
#   AI Worker Container (background processing)
#   NGINX (reverse proxy + load balancer)
#
# Usage:
#   docker-compose up                           # Start all
#   docker-compose up --scale ai-worker=5       # Scale workers
#   docker-compose down                         # Stop all
#
# Benefits:
#   ✅ Easy deployment       ✅ Environment consistency
#   ✅ Cloud portability     ✅ Horizontal scaling

version: "3.9"

services:
  # ─── Backend API (Gunicorn + Uvicorn Workers) ───
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-survey-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./frontend:/app/frontend
    environment:
      - APP_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - WORKERS=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  # ─── AI Worker (Background Processing — Scalable) ───
  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - APP_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  # ─── NGINX Reverse Proxy / Load Balancer ───
  nginx:
    image: nginx:alpine
    container_name: ai-survey-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app-data:
    driver: local
