<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Feedback & Insight Engine - Multi-Channel Survey Platform">
    <title>AI Insight Engine</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/survey-designer.css">
    <link rel="stylesheet" href="/css/chat.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <!-- ═══════════════════════════════════════════ -->
    <!-- LOGIN / REGISTER OVERLAY                   -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-brain" style="font-size:2.5rem;color:var(--primary-500)"></i>
                <h2>InsightAI</h2>
                <p class="text-muted">Multi-Channel AI Feedback & Insight Engine</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <div class="login-error" id="login-error" hidden></div>
                <div class="login-toggle">
                    Don't have an account? <a href="#" id="show-register">Create one</a>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="login-form" hidden>
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="Jane Smith" required minlength="1" maxlength="100">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="you@company.com" required maxlength="255">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" minlength="8" maxlength="128" required>
                    <small style="color: var(--gray-500); font-size: 0.75rem; margin-top: 4px; display: block;">Min 8 characters • 1 uppercase • 1 lowercase • 1 number</small>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="register-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
                <div class="login-error" id="register-error" hidden></div>
                <div class="login-toggle">
                    Already have an account? <a href="#" id="show-login">Sign in</a>
                </div>
            </form>

            <!-- Google Sign-In (outside forms to avoid validation conflicts) -->
            <div class="auth-divider"><span>or</span></div>
            <button type="button" class="btn btn-google btn-block" id="google-login-btn">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Continue with Google
            </button>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- NOTIFICATION TOAST CONTAINER               -->
    <!-- ═══════════════════════════════════════════ -->
    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- SIDEBAR NAVIGATION                         -->
    <!-- ═══════════════════════════════════════════ -->
    <nav class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <span class="logo-text">InsightAI</span>
            </div>
            <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <div class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard" role="menuitem">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-page="survey-designer" role="menuitem">
                <i class="fas fa-magic"></i>
                <span>Survey Designer</span>
            </a>
            <a href="#" class="nav-item" data-page="my-surveys" role="menuitem">
                <i class="fas fa-folder-open"></i>
                <span>My Surveys</span>
            </a>
            <a href="#" class="nav-item" data-page="insights" role="menuitem">
                <i class="fas fa-lightbulb"></i>
                <span>Insights</span>
            </a>
            <a href="#" class="nav-item" data-page="reports" role="menuitem">
                <i class="fas fa-file-chart-line fa-file-lines"></i>
                <span>Reports</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <!-- Role Selector -->
            <div class="role-selector">
                <label for="role-select" class="sr-only">View as role</label>
                <select id="role-select" class="role-select" aria-label="Select role view">
                    <option value="executive">Executive</option>
                    <option value="pm" selected>Product Manager</option>
                    <option value="designer">Designer</option>
                    <option value="engineer">Engineer</option>
                    <option value="other">Other...</option>
                </select>
                <input type="text" id="role-custom-input" class="role-custom-input" placeholder="Enter your role" maxlength="30" hidden>
            </div>
            <div class="sidebar-info">
                <small>AI Insight Engine v1.0</small>
            </div>
        </div>
    </nav>

    <!-- ═══════════════════════════════════════════ -->
    <!-- MAIN CONTENT AREA                          -->
    <!-- ═══════════════════════════════════════════ -->
    <main class="main-content" id="main-content" role="main">
        <!-- Top Bar -->
        <header class="topbar" role="banner">
            <div class="topbar-left">
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title" id="page-title">Dashboard</h1>
            </div>
            <div class="topbar-right">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search insights..." aria-label="Search insights" id="global-search">
                </div>
                <button class="topbar-btn notification-btn" id="notification-btn" aria-label="Notifications">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge" id="notification-badge" hidden>0</span>
                </button>
                <div class="view-toggle" role="radiogroup" aria-label="Dashboard view mode">
                    <button class="view-btn active" data-view="explore" aria-pressed="true">
                        <i class="fas fa-compass"></i> Explore
                    </button>
                    <button class="view-btn" data-view="story" aria-pressed="false">
                        <i class="fas fa-book-open"></i> Story
                    </button>
                </div>
            </div>
        </header>

        <!-- Notification Panel -->
        <div class="notification-panel" id="notification-panel" role="dialog" aria-label="Notifications" hidden>
            <div class="notif-panel-header">
                <h3>Notifications</h3>
                <button class="btn-text" id="mark-all-read">Mark all read</button>
            </div>
            <div class="notif-panel-body" id="notification-list"></div>
        </div>

        <!-- Page Container -->
        <div class="page-container" id="page-container">
            <div class="page-content active" id="page-dashboard"></div>
            <div class="page-content" id="page-survey-designer"></div>
            <div class="page-content" id="page-my-surveys"></div>
            <div class="page-content" id="page-insights"></div>
            <div class="page-content" id="page-reports"></div>
        </div>
    </main>

    <!-- ═══════════════════════════════════════════ -->
    <!-- MODAL OVERLAY                              -->
    <!-- ═══════════════════════════════════════════ -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal" role="dialog" aria-modal="true">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title"></h3>
                <button class="modal-close" id="modal-close" aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- SCRIPTS                                    -->
    <!-- ═══════════════════════════════════════════ -->
    <script src="/js/utils/api.js"></script>
    <script src="/js/utils/helpers.js"></script>
    <script src="/js/utils/charts.js"></script>
    <script src="/js/components/notifications.js"></script>
    <script src="/js/components/survey-designer.js"></script>
    <script src="/js/components/my-surveys.js"></script>
    <script src="/js/components/insight-dashboard.js"></script>
    <script src="/js/components/survey-chatbot.js"></script>
    <script src="/js/components/report-panel.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
