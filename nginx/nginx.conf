# ═══════════════════════════════════════════════════
# NGINX Configuration — Reverse Proxy & Load Balancer
# Infrastructure & Scalability Architecture (Section 10)
# ═══════════════════════════════════════════════════
# API Gateway responsibilities:
#   ✅ rate limiting        ✅ request routing
#   ✅ SSL termination      ✅ static file serving
#   ✅ load balancing       ✅ WebSocket proxy
#   ✅ DDoS shielding       ✅ gzip compression
# ═══════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ───
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ───
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ─── Gzip Compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ─── Rate Limiting Zones ───
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ai:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ─── Upstream (Backend Servers — Load Balanced) ───
    upstream backend {
        least_conn;                    # Route to server with fewest connections
        server backend:8000;
        # Add more backend instances for horizontal scaling:
        # server backend-2:8000;
        # server backend-3:8000;
    }

    # ─── HTTP Server — Redirect to HTTPS (production) or proxy direct (dev) ───
    server {
        listen 80;
        server_name _;

        # Health check endpoint (always available on HTTP)
        location /health {
            proxy_pass http://backend;
        }

        # If SSL certs exist, redirect to HTTPS; otherwise proxy directly (dev mode)
        # To enable HTTPS redirect, uncomment the return 301 and comment the proxy_pass block
        location / {
            # ── PRODUCTION: Uncomment this line to force HTTPS ──
            # return 301 https://$host$request_uri;

            # ── DEV MODE: Direct proxy (no SSL) ──
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support on port 80
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

